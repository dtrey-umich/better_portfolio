name: Sync Notion Content

on:
  schedule:
    - cron: '0 9 * * *'  # Run at 9 AM UTC every day
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pages: write

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
  GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup Google Drive credentials
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > scripts/gdrive-credentials.json
          echo '${{ secrets.GDRIVE_TOKEN }}' > scripts/gdrive-token.json
        
      - name: Sync images from Google Drive
        run: |
          echo "Starting Google Drive image sync..."
          echo "GDRIVE_FOLDER_ID exists: ${{ secrets.GDRIVE_FOLDER_ID != '' }}"
          npm run sync-images
        
      - name: Generate content from Notion
        run: |
          echo "Starting content generation..."
          echo "NOTION_API_KEY exists: ${{ secrets.NOTION_API_KEY != '' }}"
          echo "NOTION_DATABASE_ID exists: ${{ secrets.NOTION_DATABASE_ID != '' }}"
          node scripts/generate-notion-content.js
        
      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update content from Notion" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}