<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Poster – Interactive Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --border: rgba(255,255,255,0.09);
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #8891a8;
    --panel-h: 56px;
    --radius: 10px;
    --transition: 420ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--panel-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 18px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  #topbar h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    white-space: nowrap;
    user-select: none;
  }
  .btn:hover { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.2); }
  .btn:active { transform: scale(0.96); }
  .btn.accent { background: var(--accent); border-color: transparent; color: #fff; }
  .btn.accent:hover { background: #3a7ae0; }
  .btn svg { flex-shrink: 0; }

  #section-label {
    font-size: 12px;
    color: var(--muted);
    padding: 4px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 5px;
    border: 1px solid var(--border);
    min-width: 180px;
    text-align: center;
    transition: color 0.3s;
  }

  /* ── SECTION NAV PILL (arrow buttons) ── */
  .nav-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.18s, opacity 0.18s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.13); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: rgba(255,255,255,0.06); }

  /* ── CANVAS AREA ── */
  #canvas {
    position: fixed;
    top: var(--panel-h);
    left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,142,247,0.05) 0%, transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px);
  }
  #canvas:active { cursor: grabbing; }

  #poster-wrap {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
    transition: transform var(--transition);
  }
  #poster-wrap.no-transition {
    transition: none !important;
  }

  #poster-img {
    display: block;
    /* width/height set by JS */
    user-select: none;
    pointer-events: none;
  }

  /* ── HOTSPOT OVERLAYS ── */
  .hotspot {
    position: absolute;
    border-radius: 6px;
    border: 2px solid transparent;
    background: rgba(79,142,247,0.0);
    cursor: pointer;
    transition: background 0.22s, border-color 0.22s, box-shadow 0.22s;
    z-index: 5;
  }
  .hotspot:hover {
    background: rgba(79,142,247,0.12);
    border-color: rgba(79,142,247,0.55);
    box-shadow: 0 0 0 4px rgba(79,142,247,0.08), inset 0 0 20px rgba(79,142,247,0.04);
  }
  .hotspot .hs-label {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15,20,35,0.95);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid rgba(79,142,247,0.4);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .hotspot:hover .hs-label { opacity: 1; }

  /* ── SIDEBAR (section list) ── */
  #sidebar {
    position: fixed;
    top: calc(var(--panel-h) + 12px);
    right: 12px;
    width: 190px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 50;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #sidebar-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: var(--muted);
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .sidebar-item.active {
    background: rgba(79,142,247,0.1);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .sidebar-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* ── ZOOM CONTROLS ── */
  #zoom-controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 50;
  }

  #zoom-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 44px;
    text-align: center;
  }

  /* ── KEYBOARD HINT ── */
  #hint {
    position: fixed;
    bottom: 20px;
    right: 12px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    line-height: 1.8;
    pointer-events: none;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 999;
    gap: 16px;
  }
  #loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading p { font-size: 13px; color: var(--muted); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading poster…</p>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <h1>A Process-Centric Agent for Creativity</h1>

  <!-- Prev / section label / Next -->
  <button class="nav-btn" id="btn-prev" title="Previous section (←)" disabled>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="9,2 4,7 9,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div id="section-label">Overview</div>
  <button class="nav-btn" id="btn-next" title="Next section (→)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="5,2 10,7 5,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <button class="btn" id="btn-home" title="Back to overview (Esc)">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 6L6.5 1L12 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><rect x="3" y="6" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>
    Overview
  </button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-title">Sections</div>
  <div id="sidebar-list"></div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="poster-wrap">
    <img id="poster-img" src="droodles_poster.svg" alt="Research Poster" draggable="false">
    <div id="hotspot-layer"></div>
  </div>
</div>

<!-- ZOOM CONTROLS -->
<div id="zoom-controls">
  <button class="nav-btn" id="btn-zoom-out" title="Zoom out (-)">
    <svg width="13" height="13" viewBox="0 0 13 13"><line x1="3" y1="6.5" x2="10" y2="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div id="zoom-label">100%</div>
  <button class="nav-btn" id="btn-zoom-in" title="Zoom in (+)">
    <svg width="13" height="13" viewBox="0 0 13 13"><line x1="3" y1="6.5" x2="10" y2="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6.5" y1="3" x2="6.5" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <button class="btn" id="btn-fit" style="margin-left:4px" title="Fit to screen (F)">Fit</button>
</div>

<div id="hint">
  Click a section · ← → navigate · Esc overview · scroll zoom
</div>

<script>
// ── POSTER DIMENSIONS (from SVG viewBox) ──
const SVG_W = 3390.25;
const SVG_H = 2830.44;

// ── SECTIONS ──
// Each section: { id, label, x, y, w, h }
// Coordinates are in SVG units. A 10% padding is added when zooming in.
const SECTIONS = [
  { id: 'intro',    label: 'Introduction',                  x: 3.13,   y: 255.77, w: 1009.31, h: 694.4  },
  { id: 'method',   label: 'Experimental Method',           x: 2.63,   y: 974.67, w: 1009.31, h: 1051.27},
  { id: 'conv',     label: 'Conversation Analysis',         x: 2.79,   y: 2051.31,w: 1009.31, h: 576.62 },
  { id: 'process',  label: 'Process-Centric Agent',         x: 1046.88,y: 255.77, w: 1296.5,  h: 1046.68},
  { id: 'results',  label: 'Results',                       x: 1046.88,y: 1334.04,w: 1296.5,  h: 1496.40},
  { id: 'concl',    label: 'Conclusions',                   x: 2378.16,y: 255.77, w: 1009.31, h: 1238.37},
  { id: 'future',   label: 'Future Work',                   x: 2377.65,y: 1512.24,w: 1009.31, h: 774.97 },
  { id: 'ack',      label: 'Acknowledgements',              x: 2377.82,y: 2322.25,w: 1009.31, h: 300.60 },
];

// ── STATE ──
let currentSection = -1; // -1 = overview
let scale = 1;
let panX = 0, panY = 0;
let isDragging = false, dragStartX, dragStartY, panStartX, panStartY;
let posterPxW, posterPxH; // rendered size of the poster image
let canvasW, canvasH;     // viewport size

// ── ELEMENTS ──
const canvas      = document.getElementById('canvas');
const wrap        = document.getElementById('poster-wrap');
const img         = document.getElementById('poster-img');
const hsLayer     = document.getElementById('hotspot-layer');
const sidebarList = document.getElementById('sidebar-list');
const sectionLbl  = document.getElementById('section-label');
const btnPrev     = document.getElementById('btn-prev');
const btnNext     = document.getElementById('btn-next');
const btnHome     = document.getElementById('btn-home');
const btnZoomIn   = document.getElementById('btn-zoom-in');
const btnZoomOut  = document.getElementById('btn-zoom-out');
const btnFit      = document.getElementById('btn-fit');
const zoomLbl     = document.getElementById('zoom-label');
const loading     = document.getElementById('loading');

// ── INIT ──
img.onload = function() {
  loading.style.display = 'none';
  resize();
  buildHotspots();
  buildSidebar();
  goOverview(false);
};
img.onerror = function() {
  loading.querySelector('p').textContent = 'Failed to load poster. Make sure droodles_poster.svg is in the same folder.';
};

function resize() {
  canvasW = canvas.clientWidth;
  canvasH = canvas.clientHeight;
}
window.addEventListener('resize', () => { resize(); if (currentSection === -1) goOverview(false); });

// ── COMPUTE FIT SCALE ──
function fitScale() {
  const sx = canvasW / SVG_W;
  const sy = canvasH / SVG_H;
  return Math.min(sx, sy) * 0.96;
}

// ── SET TRANSFORM ──
function applyTransform(animated) {
  if (!animated) wrap.classList.add('no-transition');
  wrap.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  zoomLbl.textContent = Math.round(scale * 100) + '%';
  if (!animated) {
    // force reflow
    wrap.getBoundingClientRect();
    wrap.classList.remove('no-transition');
  }
}

// ── OVERVIEW ──
function goOverview(animated = true) {
  currentSection = -1;
  scale = fitScale();
  panX = (canvasW - SVG_W * scale) / 2;
  panY = (canvasH - SVG_H * scale) / 2;
  applyTransform(animated);
  sectionLbl.textContent = 'Overview';
  updateSidebarActive();
  updateNavBtns();
  // show hotspots
  document.querySelectorAll('.hotspot').forEach(h => { h.style.opacity = '1'; h.style.pointerEvents = 'auto'; });
}

// ── ZOOM TO SECTION ──
function goSection(idx, animated = true) {
  if (idx < 0 || idx >= SECTIONS.length) return;
  currentSection = idx;
  const s = SECTIONS[idx];

  // Pad by 6%
  const PAD = 0.06;
  const sx = s.x - s.w * PAD;
  const sy = s.y - s.h * PAD;
  const sw = s.w * (1 + 2 * PAD);
  const sh = s.h * (1 + 2 * PAD);

  const scaleX = canvasW / sw;
  const scaleY = canvasH / sh;
  scale = Math.min(scaleX, scaleY);

  panX = canvasW / 2 - (sx + sw / 2) * scale;
  panY = canvasH / 2 - (sy + sh / 2) * scale;

  applyTransform(animated);
  sectionLbl.textContent = s.label;
  updateSidebarActive();
  updateNavBtns();
  // dim hotspots while zoomed
  document.querySelectorAll('.hotspot').forEach(h => { h.style.opacity = '0'; h.style.pointerEvents = 'none'; });
}

// ── HOTSPOTS ──
function buildHotspots() {
  SECTIONS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'hotspot';
    el.style.left   = s.x + 'px';
    el.style.top    = s.y + 'px';
    el.style.width  = s.w + 'px';
    el.style.height = s.h + 'px';
    el.title = s.label;
    const lbl = document.createElement('div');
    lbl.className = 'hs-label';
    lbl.textContent = s.label;
    el.appendChild(lbl);
    el.addEventListener('click', () => goSection(i));
    hsLayer.appendChild(el);
  });
}

// ── SIDEBAR ──
function buildSidebar() {
  SECTIONS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'sidebar-item';
    el.dataset.idx = i;
    el.innerHTML = `<span class="dot"></span>${s.label}`;
    el.addEventListener('click', () => goSection(i));
    sidebarList.appendChild(el);
  });
}

function updateSidebarActive() {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === currentSection);
  });
}

function updateNavBtns() {
  btnPrev.disabled = currentSection <= 0;
  btnNext.disabled = currentSection === SECTIONS.length - 1;
  if (currentSection === -1) {
    btnPrev.disabled = true;
    btnNext.disabled = false;
  }
}

// ── NAV BUTTONS ──
btnHome.addEventListener('click', goOverview);
btnPrev.addEventListener('click', () => {
  if (currentSection > 0) goSection(currentSection - 1);
  else if (currentSection === 0) goOverview();
});
btnNext.addEventListener('click', () => {
  if (currentSection === -1) goSection(0);
  else if (currentSection < SECTIONS.length - 1) goSection(currentSection + 1);
});

// ── ZOOM BUTTONS ──
btnZoomIn.addEventListener('click',  () => zoomBy(1.25));
btnZoomOut.addEventListener('click', () => zoomBy(0.8));
btnFit.addEventListener('click', () => {
  if (currentSection === -1) goOverview(); else goSection(currentSection, false);
});

function zoomBy(factor, cx, cy) {
  cx = cx ?? canvasW / 2;
  cy = cy ?? canvasH / 2;
  const newScale = Math.min(Math.max(scale * factor, 0.1), 12);
  panX = cx - (cx - panX) * (newScale / scale);
  panY = cy - (cy - panY) * (newScale / scale);
  scale = newScale;
  applyTransform(false);
  // disable hotspots if zoomed in enough
  const ov = scale <= fitScale() * 1.5;
  document.querySelectorAll('.hotspot').forEach(h => {
    h.style.opacity = ov && currentSection === -1 ? '1' : '0';
    h.style.pointerEvents = ov && currentSection === -1 ? 'auto' : 'none';
  });
}

// ── SCROLL TO ZOOM ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  zoomBy(factor, cx, cy);
}, { passive: false });

// ── DRAG TO PAN ──
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
  wrap.classList.add('no-transition');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = panStartX + e.clientX - dragStartX;
  panY = panStartY + e.clientY - dragStartY;
  applyTransform(false);
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  wrap.classList.remove('no-transition');
});

// ── TOUCH DRAG + PINCH ──
let touches = [];
let pinchDist0 = null;
canvas.addEventListener('touchstart', e => {
  touches = Array.from(e.touches);
  if (touches.length === 1) {
    isDragging = true;
    dragStartX = touches[0].clientX;
    dragStartY = touches[0].clientY;
    panStartX = panX; panStartY = panY;
    wrap.classList.add('no-transition');
  } else if (touches.length === 2) {
    isDragging = false;
    pinchDist0 = Math.hypot(touches[0].clientX - touches[1].clientX,
                             touches[0].clientY - touches[1].clientY);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touches = Array.from(e.touches);
  if (touches.length === 1 && isDragging) {
    panX = panStartX + touches[0].clientX - dragStartX;
    panY = panStartY + touches[0].clientY - dragStartY;
    applyTransform(false);
  } else if (touches.length === 2 && pinchDist0) {
    const dist = Math.hypot(touches[0].clientX - touches[1].clientX,
                             touches[0].clientY - touches[1].clientY);
    const cx = (touches[0].clientX + touches[1].clientX) / 2 - canvas.getBoundingClientRect().left;
    const cy = (touches[0].clientY + touches[1].clientY) / 2 - canvas.getBoundingClientRect().top;
    zoomBy(dist / pinchDist0, cx, cy);
    pinchDist0 = dist;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => {
  isDragging = false;
  pinchDist0 = null;
  wrap.classList.remove('no-transition');
}, { passive: true });

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'Escape': goOverview(); break;
    case 'ArrowLeft': case 'ArrowUp':
      e.preventDefault();
      if (currentSection > 0) goSection(currentSection - 1);
      else if (currentSection === 0) goOverview();
      break;
    case 'ArrowRight': case 'ArrowDown':
      e.preventDefault();
      if (currentSection === -1) goSection(0);
      else if (currentSection < SECTIONS.length - 1) goSection(currentSection + 1);
      break;
    case '+': case '=': zoomBy(1.2); break;
    case '-': zoomBy(0.8); break;
    case 'f': case 'F':
      if (currentSection === -1) goOverview(false);
      else goSection(currentSection, false);
      break;
  }
});

// Initial nav btn state
updateNavBtns();
</script>
</body>
</html>
