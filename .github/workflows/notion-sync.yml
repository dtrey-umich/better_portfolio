name: Sync Notion Content

on:
  schedule:
    - cron: '0 9 * * *'  # Run at 9 AM UTC every day
  workflow_dispatch:  # Allow manual triggering

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate content from Notion
        run: node scripts/generate-notion-content.js
        
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update content from Notion [skip ci]" && git push)